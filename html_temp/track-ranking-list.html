    <style>
        html {
            font: 9px "UD デジタル 教科書体 N-R", "ＭＳ 明朝";
        }

        /* A4縦用のベース設定 */
        @page {
            size: A4 portrait;
            /* 横の場合はlandscape */
            margin: 0mm;
        }

        /* 各要素の余白リセット */
        * {
            margin: 0mm;
            padding: 0mm;
        }

        /* プレビュー用のスタイル */
        @media screen {
            body {
                background: #eee;
            }

            .page {
                background: white;
                /* 背景を白く */
                box-shadow: 0 0.5mm 2mm rgba(0, 0, 0, 0.3);
                /* ドロップシャドウ */
                margin: 5mm;
            }
        }

        /* 印刷時の調子を整える */
        body {
            width: 210mm;
            /* 用紙の横幅を改めて指定 Chrome用 */
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            line-height: 1.5em;
        }

        h1 {
            font-size: 16px;
        }

        h2 {
            font-size: 12px;
        }

        h3 {
            font-size: 9px;
        }

        table,
        tr,
        td {
            font-size: 7.5px;
        }

        td div {
            min-height: 1.15rem;
            max-height: 1.15rem;
            overflow: hidden;
        }

        /* 印刷1ページ用のコンテンツはここで定義 */
        .page {
            width: 210mm;
            /* 用紙の横幅を改めて指定 */
            height: 296.5mm;
            /* 高さには0.5mm余裕をもたせる */
            page-break-after: always;

            box-sizing: border-box;
            padding: 8mm 8mm;
            /* 用紙の余白 */
        }

        .content-area {
            margin: 0 2rem;
        }

        .round-list-table .round-name-col {
            width: 5rem;
        }

        .round-list-table .round-date-col {
            width: 5rem;
            text-align: right;
        }

        .round-list-table .round-time-col {
            width: 3rem;
            text-align: right;
        }

        .game-record-list-table .record-name-col {
            width: 15rem;
        }

        .game-record-list-table .record-col {
            width: 5rem;
            text-align: right;
        }

        .game-record-list-table .athlete-name-col,
        .game-record-list-table .team-name-col {
            width: 10rem;
            padding-left: 0.5rem;
        }

        .game-record-list-table .record-ymd-col {
            width: 5rem;
        }

        .start-list-header>div {
            display: inline-block;
            vertical-align: top;
        }

        .header-area-time-table {
            width: 30%;
        }

        .header-area-game-record>table {
            width: 100%;
        }

        .ranking-area {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
        }

        .ranking-table tr td {
            vertical-align: top;
        }

        .ranking-table tr.header-row th {
            border-bottom: 1px solid #000;
        }

        .ranking-table .order-col {
            min-width: 2rem;
            text-align: right;
        }

        .ranking-table .rank-col {
            min-width: 2.5rem;
            text-align: right;
        }

        .ranking-table .bib-col {
            min-width: 3rem;
            text-align: right;
        }

        .ranking-table .name-col {
            min-width: 8.5rem;
        }

        .ranking-table .team-col {
            min-width: 8.5rem;
        }

        .ranking-table .quali-col {
            min-width: 4.5rem;
            text-align: right;
        }

        .ranking-table .result-col {
            min-width: 4.5rem;
            text-align: right;
        }

        .ranking-table .wind-col {
            min-width: 2rem;
            text-align: right;
        }
    </style>

    <script id="replace-process" type="text/javascript">
        const jsonElement = document.getElementById('json-param');
        const paramData = JSON.parse(jsonElement.textContent);
        console.log(paramData);

        const formatDate = function (value, format) {
            const dateValue = new Date(value);
            if (isNaN(dateValue.valueOf())) {
                return value;
            }

            const year = dateValue.getFullYear();
            const month = dateValue.getMonth() + 1;
            const day = dateValue.getDate();

            const hour = dateValue.getHours();
            const minute = dateValue.getMinutes();
            const second = dateValue.getSeconds();

            let formatedValue = format;
            formatedValue = formatedValue.replace("%yyyy", year);
            formatedValue = formatedValue.replace("%MM", ('0' + month).slice(-2));
            formatedValue = formatedValue.replace("%M", month);
            formatedValue = formatedValue.replace("%dd", ('0' + day).slice(-2));
            formatedValue = formatedValue.replace("%d", day);
            formatedValue = formatedValue.replace("%hh", ('0' + hour).slice(-2));
            formatedValue = formatedValue.replace("%h", hour);
            formatedValue = formatedValue.replace("%mm", ('0' + minute).slice(-2));
            formatedValue = formatedValue.replace("%m", minute);
            formatedValue = formatedValue.replace("%ss", ('0' + second).slice(-2));
            formatedValue = formatedValue.replace("%s", second);

            return formatedValue;
        };

        function shrinkToFit() {
            document.querySelectorAll('td div').forEach(child => {
                if (child.scrollHeight <= child.getBoundingClientRect().height) {
                    return;
                }

                for (let size = 100; size > 0; size -= 5) {
                    child.style.fontSize = size + '%';
                    if (child.scrollHeight <= child.getBoundingClientRect().height) {
                        // 1行に収まればここで処理終了.
                        break;
                    }
                }
                console.log(child.style.fontSize);
            });
        }

        const replaceInnerHtml = function (element, elementProcess = {}) {
            if (elementProcess.replaceValue === undefined) {
                return;
            }

            replaceValue = elementProcess.replaceValue;

            let childToWrite = '';
            if (replaceValue != null && replaceValue !== '') {
                const prefix = element.getAttribute('data-prefix') ?? '';
                const suffix = element.getAttribute('data-suffix') ?? '';
                const format = element.getAttribute('data-format');
                if (format == null) {
                    if (Number.isFinite(replaceValue) && elementProcess.numberFormat != null) {
                        childToWrite = elementProcess.numberFormat.format(replaceValue);
                    } else {
                        childToWrite = replaceValue;
                    }
                } else {
                    childToWrite = formatDate(replaceValue, format);
                }
                childToWrite = prefix + childToWrite + suffix;
            }
            element.innerHTML = childToWrite;
        };

        const writeChildText = function (attribute, elementProcess = {}) {
            document.querySelectorAll("[" + attribute + "]").forEach(element => {
                if (elementProcess.displayCondition != null) {
                    if (elementProcess.displayCondition(element) == false) {
                        element.remove();
                        return;
                    }
                }

                replaceInnerHtml(element, elementProcess);
            });
        };

        const writeIteratedChildText = function (targetAttribute, parentAttributes, valueFunction, elementProcess = { replaceInner: true }) {
            let selector = '';
            parentAttributes.forEach((attr, i) => selector += ((i > 0 ? ' ' : '') + '[' + attr + ']'));

            document.querySelectorAll(selector).forEach(parent => {
                const indexes = parent.getAttribute('data-iteration-indexes').split(',').map(str => Number.parseInt(str));
                value = valueFunction(indexes);

                if (elementProcess.replaceInner) {
                    elementProcess.replaceValue = value;
                }

                parent.querySelectorAll('[' + targetAttribute + ']').forEach(element => {
                    if (elementProcess.displayCondition != null) {
                        if (elementProcess.displayCondition(element, value) == false) {
                            element.remove();
                            return;
                        }
                    }
                    replaceInnerHtml(element, elementProcess)
                });
            });
        }

        function breakPage(pageNode, ...trancationNodeClasses) {
            pageNode.parentElement.appendChild(pageNode.cloneNode(true));
            var allPageElements = document.getElementsByClassName('page');
            var nextPageNode = allPageElements.item(allPageElements.length - 1);
            
            // トップページ要素の削除
            Array.from(nextPageNode.getElementsByClassName('top-page-only')).forEach(element => element.remove());
            // コピー先のごみデータ削除
            trancationNodeClasses.forEach(trancationNodeClass => {
                Array.from(nextPageNode.getElementsByClassName(trancationNodeClass)).forEach(trancationNode => {
                    Array.from(trancationNode.children).forEach(child => child.remove());
                });
            });

            nextPageNode.setAttribute('page', allPageElements.length);
            return nextPageNode;
        }

        function moveToPage(destinationNodeClass, targetNodeClass) {
            var currentPageNode = document.body.querySelectorAll('section.page').item(0);

            Array.from(document.getElementsByClassName(destinationNodeClass)).forEach(destinationNode => {
                Array.from(currentPageNode.getElementsByClassName(targetNodeClass)).forEach(targetNode => {
                    var addedNode = targetNode.appendChild(destinationNode);
                    if (currentPageNode.clientHeight >= currentPageNode.scrollHeight) {
                        return;
                    }

                    currentPageNode = breakPage(currentPageNode, targetNodeClass)

                    // 高さを超えたので、改ページ.
                    Array.from(currentPageNode.getElementsByClassName(targetNodeClass)).forEach(nextPageNode => {
                        nextPageNode.appendChild(addedNode.cloneNode(true));
                    });

                    // 前ページのごみを削除.
                    addedNode.remove();

                });
            })
        }

        const putTrackEventElement = function (param) {
            writeChildText('track-event__category', { replaceValue: param.category });
            writeChildText('track-event__sex', { replaceValue: param.sex });
            writeChildText('track-event__event-name', { replaceValue: param.event_name });
            writeChildText('track-event__supecification', { replaceValue: param.supecification });
            writeChildText('track-event__person-per-result', { replaceValue: param.person_per_result });
            writeChildText('track-event__rounds-count', { replaceValue: param.rounds_count });
            writeChildText('track-event__operation-wind-gauge', { displayCondition: element => param.operation_wind_gauge });
            writeChildText('track-event__measurement-reaction-time', { displayCondition: element => param.measurement_reaction_time });
            writeChildText('track-event__scoring-combined-events', { displayCondition: element => param.scoring_combined_events });
            writeChildText('track-event__split-time-points', { displayCondition: element => param.split_time_points.length > 0 })

            document.querySelectorAll('[track-event__split-time-points__]').forEach(element => {
                const parent = element.parentElement;
                param.split_time_points.forEach((point, i) => {
                    const copiedElement = element.cloneNode(true);
                    copiedElement.setAttribute('data-iteration-indexes', i);
                    parent.appendChild(copiedElement);
                });

                element.remove();
            });

            writeIteratedChildText('split-time-point__point', ['track-event__split-time-points__'], indexes => param.split_time_points[indexes[0]]);
        };

        const putRoundsElement = function (param) {
            document.querySelectorAll('[rounds__]').forEach(element => {
                const parent = element.parentElement;
                param.forEach((round, i) => {
                    const copiedElement = element.cloneNode(true);
                    copiedElement.setAttribute('data-iteration-indexes', i);
                    copiedElement.setAttribute('round__id', round.id)
                    parent.appendChild(copiedElement);
                });

                element.remove();
            });

            writeIteratedChildText('round__name', ['rounds__'], indexes => param[indexes[0]].name);
            writeIteratedChildText('round__start-date-time', ['rounds__'], indexes => param[indexes[0]].start_date_time);
            writeIteratedChildText('round__result-count', ['rounds__'], indexes => param[indexes[0]].result_count);
            writeIteratedChildText('round__place-each-result', ['rounds__'], indexes => param[indexes[0]].place_each_result);
            writeIteratedChildText('round__addition-count', ['rounds__'], indexes => param[indexes[0]].addition_count);
        };

        const putCurrentRoundElement = function (param) {
            const qualifiersCount = param.group_count * param.place_each_group + param.addition_count;

            writeChildText('current-round__name', { replaceValue: param.name });
            writeChildText('current-round__start-date-time', { replaceValue: param.start_date_time });
            writeChildText('current-round__result-count', {
                replaceValue: param.group_count, displayCondition: element => {
                    const greaterThan = Number.parseInt(element.getAttribute('data-greater-than'));
                    if (isNaN(greaterThan)) {
                        return true;
                    }
                    return param.group_count > greaterThan;
                }
            });
            writeChildText('current-round__place-each-result', { replaceValue: param.place_each_group, displayCondition: element => qualifiersCount > 0 });
            writeChildText('current-round__addition-count', { replaceValue: param.addition_count, displayCondition: element => qualifiersCount > 0 });

            document.querySelectorAll('[data-current-round-id]').forEach(element => {
                element.removeAttribute('data-current-round-id');
                element.classList.add('current-round-id__' + param.id);
            });
        };

        const putGameRecordsElement = function (param) {
            document.querySelectorAll("[game-records__]").forEach(element => {
                const parent = element.parentElement;
                param.forEach((record, i) => {
                    const copiedElement = element.cloneNode(true);
                    copiedElement.setAttribute('data-iteration-indexes', i);
                    parent.appendChild(copiedElement);
                });

                element.remove();
            });

            writeIteratedChildText('game-record__name', ['game-records__'], indexes => param[indexes[0]].name);
            writeIteratedChildText('game-record__abbrebiation', ['game-records__'], indexes => param[indexes[0]].abbrebiation);
            writeIteratedChildText('game-record__record', ['game-records__'], indexes => param[indexes[0]].record);
            writeIteratedChildText('game-record__athlete-name', ['game-records__'], indexes => param[indexes[0]].athlete_name);
            writeIteratedChildText('game-record__team-name', ['game-records__'], indexes => param[indexes[0]].team_name);
            writeIteratedChildText('game-record__team-place', ['game-records__'], indexes => param[indexes[0]].team_place);
            writeIteratedChildText('game-record__record-ymd', ['game-records__'], indexes => param[indexes[0]].recorded_ymd);
            writeIteratedChildText('game-record__record-time-unit', ['game-records__'], indexes => param[indexes[0]].record_time_unit);
        }

        const putResultRankingListElement = function (param) {
            document.querySelectorAll("[results__]").forEach(parent_1 => {
                const parent_0 = parent_1.parentElement;
                for (let i = 0; i < param.length; i++) {
                    const orderList = param[i];

                    const copiedElement = parent_1.cloneNode(true);
                    copiedElement.setAttribute('data-iteration-indexes', i);

                    parent_0.appendChild(copiedElement);
                }

                parent_1.remove();
            });

            const windFormatter = new Intl.NumberFormat('ja-JP', { style: 'decimal', signDisplay: 'exceptZero', minimumFractionDigits: 1, maximumFractionDigits: 1,  });
            writeIteratedChildText('result__total-rank', ['results__'], indexes => param[indexes[0]].total_rank, { displayCondition: (element, value) => value > 0, replaceInner: true });
            writeIteratedChildText('result__result', ['results__'], indexes => param[indexes[0]].result);
            writeIteratedChildText('result__wind', ['results__'], indexes => param[indexes[0]].wind, { replaceInner: true, displayCondition: (element, value) => Number.isFinite(value), numberFormat: windFormatter });
            writeIteratedChildText('result__next-qualified', ['results__'], indexes => param[indexes[0]].next_qualified);
            writeIteratedChildText('result__advanced-next-round', ['results__'], indexes => param[indexes[0]].advanced_next_round);
            writeIteratedChildText('result__not-started', ['results__'], indexes => param[indexes[0]].not_started, { displayCondition: (element, value) => value });
            writeIteratedChildText('result__not-finished', ['results__'], indexes => param[indexes[0]].not_finished, { displayCondition: (element, value) => value });
            writeIteratedChildText('result__disqualified', ['results__'], indexes => param[indexes[0]].disqualified, { displayCondition: (element, value) => value });
            writeIteratedChildText('result__demo-entry', ['results__'], indexes => param[indexes[0]].demo_entry, { displayCondition: (element, value) => value });
            writeIteratedChildText('result__disqualified-reason', ['results__'], indexes => param[indexes[0]].disqualified_reason);
            writeIteratedChildText('result__same-result', ['results__'], indexes => param[indexes[0]].same_result, { displayCondition: (element, value) => value > 0 });
            writeIteratedChildText('result__remark', ['results__'], indexes => param[indexes[0]].remark);
            writeIteratedChildText('result__real-result', ['results__'], indexes => param[indexes[0]].real_result);
            writeIteratedChildText('result__result-rank', ['results__'], indexes => param[indexes[0]].result_rank, { displayCondition: (element, value) => value > 0, replaceInner: true });
            writeIteratedChildText('result__reaction-time', ['results__'], indexes => param[indexes[0]].reaction_time);
            writeIteratedChildText('result__score', ['results__'], indexes => param[indexes[0]].score);
            writeIteratedChildText('result__id', ['results__'], indexes => param[indexes[0]].id);
            writeIteratedChildText('result__group', ['results__'], indexes => param[indexes[0]].group_number);
            writeIteratedChildText('result__order', ['results__'], indexes => param[indexes[0]].order);
            writeIteratedChildText('result__rank', ['results__'], indexes => param[indexes[0]].rank, { displayCondition: (element, value) => value > 0, replaceInner: true });
            writeIteratedChildText('result__accumaltive', ['results__'], indexes => param[indexes[0]].accumaltive.join(', '));
            writeIteratedChildText('result__person__id', ['results__'], indexes => param[indexes[0]].person.id);
            writeIteratedChildText('result__person__sex', ['results__'], indexes => param[indexes[0]].person.sex);
            writeIteratedChildText('result__person__bib', ['results__'], indexes => param[indexes[0]].person.bib);
            writeIteratedChildText('result__person__personal-name', ['results__'], indexes => param[indexes[0]].person.personal_name);
            writeIteratedChildText('result__person__age', ['results__'], indexes => param[indexes[0]].person.age);
            writeIteratedChildText('result__person__personal-phonetic', ['results__'], indexes => param[indexes[0]].person.personal_phonetic);
            writeIteratedChildText('result__person__personal-latin', ['results__'], indexes => param[indexes[0]].person.personal_latin);
            writeIteratedChildText('result__person__team-name', ['results__'], indexes => param[indexes[0]].person.team_name);
            writeIteratedChildText('result__person__team-place', ['results__'], indexes => param[indexes[0]].person.team_place);
            writeIteratedChildText('result__person__personal-country', ['results__'], indexes => param[indexes[0]].person.personal_country);
            writeIteratedChildText('result__person__personal-grade', ['results__'], indexes => param[indexes[0]].person.personal_grade);
        };

        putTrackEventElement(paramData.track_event);
        putRoundsElement(paramData.rounds);

        putGameRecordsElement(paramData.game_records)

        moveToPage('ranking-row', 'ranking-row-area');
        shrinkToFit();

        Array.from(document.getElementsByClassName('dummy-page')).forEach(value => value.remove());
